name: Build & Sign APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Fix JNI symlinks
        run: |
          for ABI in arm64-v8a armeabi-v7a x86 x86_64; do
            DIR="app/src/main/jniLibs/$ABI"
            if [ -f "$DIR/libcrypto.so" ]; then
              CONTENT=$(cat "$DIR/libcrypto.so")
              if [ "$CONTENT" = "libcryptox.so" ]; then
                cp "$DIR/libcryptox.so" "$DIR/libcrypto.so"
              fi
            fi
            if [ -f "$DIR/libssl.so" ]; then
              CONTENT=$(cat "$DIR/libssl.so")
              if [ "$CONTENT" = "libsslx.so" ]; then
                cp "$DIR/libsslx.so" "$DIR/libssl.so"
              fi
            fi
          done

      - name: Decode Keystore
        run: |
          mkdir -p app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore/spgram.jks

      - name: Build Release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: SPGram-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
