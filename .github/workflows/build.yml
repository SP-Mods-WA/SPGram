name: Build SPGram APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Inject API credentials
        run: |
          sed -i "s/API_ID_PLACEHOLDER/${{ secrets.TELEGRAM_API_ID }}/g" \
            app/src/main/java/com/spmods/spgram/BuildVars.java
          sed -i "s/API_HASH_PLACEHOLDER/${{ secrets.TELEGRAM_API_HASH }}/g" \
            app/src/main/java/com/spmods/spgram/BuildVars.java

      - name: Download TDLib native libs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          mkdir -p app/src/main/jniLibs/x86_64
          mkdir -p app/src/main/jniLibs/x86

          BASE="https://github.com/TGX-Android/tdlib/raw/main/libs"
          curl -fsSL "$BASE/arm64-v8a/libtdjni.so" -o app/src/main/jniLibs/arm64-v8a/libtdjni.so
          curl -fsSL "$BASE/armeabi-v7a/libtdjni.so" -o app/src/main/jniLibs/armeabi-v7a/libtdjni.so
          curl -fsSL "$BASE/x86_64/libtdjni.so" -o app/src/main/jniLibs/x86_64/libtdjni.so
          curl -fsSL "$BASE/x86/libtdjni.so" -o app/src/main/jniLibs/x86/libtdjni.so

          echo "=== jniLibs contents ==="
          find app/src/main/jniLibs -type f -exec ls -lh {} \;

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SPGram-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
