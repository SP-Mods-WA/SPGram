name: Build SPGram APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore app/release.keystore \
            -alias ${{ secrets.KEY_ALIAS }} \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=SPMods, OU=SPMods, O=SPMods, L=Colombo, S=WP, C=LK" \
            -storepass ${{ secrets.STORE_PASSWORD }} \
            -keypass ${{ secrets.KEY_PASSWORD }}

      - name: Inject API credentials
        run: |
          sed -i "s/API_ID_PLACEHOLDER/${{ secrets.TELEGRAM_API_ID }}/g" \
            app/src/main/java/com/spmods/spgram/BuildVars.java
          sed -i "s/API_HASH_PLACEHOLDER/${{ secrets.TELEGRAM_API_HASH }}/g" \
            app/src/main/java/com/spmods/spgram/BuildVars.java

      - name: Download TDLib native libs
        run: |
          curl -L "https://core.telegram.org/tdlib/tdlib.zip" -o tdlib.zip
          unzip -q tdlib.zip -d tdlib_extracted
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          mkdir -p app/src/main/jniLibs/x86_64
          mkdir -p app/src/main/jniLibs/x86
          find tdlib_extracted -name "libtdjni.so" | while read f; do
            arch_dir=$(basename $(dirname "$f"))
            cp "$f" "app/src/main/jniLibs/${arch_dir}/libtdjni.so" 2>/dev/null || true
          done
          ls app/src/main/jniLibs/

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SPGram-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
