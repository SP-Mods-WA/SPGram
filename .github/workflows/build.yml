name: Build SPGram APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Inject API credentials
        run: |
          sed -i "s/API_ID_PLACEHOLDER/${{ secrets.TELEGRAM_API_ID }}/g" \
            app/src/main/java/com/spmods/spgram/BuildVars.java
          sed -i "s/API_HASH_PLACEHOLDER/${{ secrets.TELEGRAM_API_HASH }}/g" \
            app/src/main/java/com/spmods/spgram/BuildVars.java

      - name: Download TDLib native libs
        run: |
          ARCHS="arm64-v8a armeabi-v7a x86_64 x86"
          TDLIB_BASE="https://github.com/TGX-Android/tdlib/raw/main/src/main/libs"
          OPENSSL_BASE="https://github.com/TGX-Android/tdlib/raw/main/openssl"

          for ARCH in $ARCHS; do
            mkdir -p app/src/main/jniLibs/$ARCH
            curl -fsSL "$TDLIB_BASE/$ARCH/libtdjni.so"         -o app/src/main/jniLibs/$ARCH/libtdjni.so
            curl -fsSL "$OPENSSL_BASE/$ARCH/lib/libsslx.so"    -o app/src/main/jniLibs/$ARCH/libsslx.so
            curl -fsSL "$OPENSSL_BASE/$ARCH/lib/libcryptox.so" -o app/src/main/jniLibs/$ARCH/libcryptox.so
            # libssl.so සහ libcrypto.so submodule pointers (10 bytes) - skip
          done

          echo "=== jniLibs contents ==="
          find app/src/main/jniLibs -type f -exec ls -lh {} \;

      - name: Verify lib sizes
        run: |
          find app/src/main/jniLibs -name "*.so" | while read f; do
            size=$(stat -c%s "$f")
            echo "$f => $size bytes"
            if [ "$size" -lt 100000 ]; then
              echo "ERROR: $f is too small - likely a submodule pointer!"
              exit 1
            fi
          done

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SPGram-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
