name: SPGRAM Release Build

on:
  push:
    branches: ["main", "master", "develop"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK & NDK
      uses: android-actions/setup-android@v3

    - name: Make scripts executable
      run: |
        chmod +x gradlew
        chmod +x presentation/src/main/cpp/build.sh

    - name: Build libvpx
      run: |
        export ANDROID_NDK_HOME=$ANDROID_NDK_ROOT
        cd presentation/src/main/cpp && ./build.sh

    - name: Decode keystore
      run: |
        mkdir -p app/keystore
        echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore/spgram.jks
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    - name: Create local.properties
      run: |
        echo "API_ID=$TELEGRAM_API_ID" > local.properties
        echo "API_HASH=$TELEGRAM_API_HASH" >> local.properties
        echo "RELEASE_STORE_FILE=app/keystore/spgram.jks" >> local.properties
        echo "RELEASE_STORE_PASSWORD=$STORE_PASSWORD" >> local.properties
        echo "RELEASE_KEY_ALIAS=$KEY_ALIAS" >> local.properties
        echo "RELEASE_KEY_PASSWORD=$KEY_PASSWORD" >> local.properties
      env:
        TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
        TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build SPGRAM Release APK
      run: ./gradlew assembleOfficialRelease --stacktrace

    - name: Find APK
      run: find . -name "*.apk" -type f

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: spgram-release
        path: |
          app/build/outputs/apk/official/release/*.apk
          app/releases/*.apk
        if-no-files-found: warn

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      with:
        tag_name: v${{ github.run_number }}
        name: SPGRAM v${{ github.run_number }}
        files: |
          app/build/outputs/apk/official/release/*.apk
          app/releases/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
