name: SPGRAM Release Build

on:
  push:
    branches: ["master", "develop"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
        token: ${{ secrets.PAT_TOKEN }}

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK & NDK
      uses: android-actions/setup-android@v3

    - name: Decode keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/spgram.jks

    - name: Create local.properties
      run: |
        cat > local.properties <<PROPS
        API_ID=${{ secrets.TELEGRAM_API_ID }}
        API_HASH=${{ secrets.TELEGRAM_API_HASH }}
        RELEASE_STORE_FILE=../spgram.jks
        RELEASE_STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}
        RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
        RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
        PROPS

    - name: Make scripts executable
      run: |
        chmod +x gradlew
        chmod +x presentation/src/main/cpp/build.sh

    - name: Build libvpx
      run: |
        export ANDROID_NDK_HOME=$ANDROID_NDK_ROOT
        cd presentation/src/main/cpp && ./build.sh

    - name: Build SPGRAM Release APK
      run: ./gradlew assembleOfficialRelease

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: spgram-release
        path: app/releases/*.apk
        if-no-files-found: error

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/master'
      with:
        tag_name: v${{ github.run_number }}
        name: SPGRAM v${{ github.run_number }}
        files: app/releases/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
