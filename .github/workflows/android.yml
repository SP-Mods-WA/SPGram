name: SPGRAM Release Build

on:
  push:
    branches: ["main", "master", "develop"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Decode keystore
      run: |
        mkdir -p app/keystore
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore/spgram.jks

    - name: Create local.properties
      run: |
        cat > local.properties << PROPS
API_ID=${{ secrets.TELEGRAM_API_ID }}
API_HASH=${{ secrets.TELEGRAM_API_HASH }}
RELEASE_STORE_FILE=keystore/spgram.jks
RELEASE_STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}
RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
PROPS
        cat local.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build SPGRAM Release APK
      run: ./gradlew assembleOfficialRelease --stacktrace

    - name: Find APK
      run: find . -name "*.apk" -type f

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: spgram-release
        path: |
          app/build/outputs/apk/official/release/*.apk
          app/releases/*.apk
        if-no-files-found: warn

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      with:
        tag_name: v${{ github.run_number }}
        name: SPGRAM v${{ github.run_number }}
        files: |
          app/build/outputs/apk/official/release/*.apk
          app/releases/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
